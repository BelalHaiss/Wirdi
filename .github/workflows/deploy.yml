name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Docker Publish"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 213.199.38.183
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/controller-hub
            docker compose pull wirdi-prod wirdi-staging
            docker compose up -d --no-deps wirdi-prod wirdi-staging
            docker image prune -f
